name: CI

on:
  push:
    branches: [main, testing]
  pull_request:
  workflow_dispatch:

jobs:
  hassfest:
    name: Hassfest-Validierung
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS-Validierung
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hacs/action@main
        with:
          category: integration
          # Integration ist (noch) nicht im home-assistant/brands-Repo
          # registriert - Icons liegen lokal unter brand/.
          ignore: brands

  lint:
    name: Ruff-Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: pip install ruff
      - run: ruff check .

  tests:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: pip install -r requirements_test.txt
      # -m "" overrides the default deselection in pytest.ini: CI always runs
      # the end-to-end tests as well. They cost ~50 s, which is irrelevant here
      # and makes every push a full check.
      - run: python -m pytest tests/ -q -m ""
