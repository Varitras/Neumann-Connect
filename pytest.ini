[pytest]
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
# Safety net against hanging tests (locally and in CI).
timeout = 30
# End-to-end tests boot a full Home Assistant instance per test (~16 s each,
# ~50 s in total) and are deselected by default so the everyday run stays
# around 4 s. They are mandatory before a release and run automatically in CI.
#   everyday : pytest tests/ -q
#   e2e only : pytest tests/ -q -m e2e
#   full run : pytest tests/ -q -m ""
addopts = -m "not e2e"
markers =
    e2e: full end-to-end test against a real Home Assistant setup (slow)
